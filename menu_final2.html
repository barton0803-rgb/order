<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>今日菜單</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#ffffff; --bg2:#f5f5f5; --bg3:#eeeeee;
  --text:#111111; --text2:#555555; --text3:#999999;
  --border:#dddddd; --border2:#bbbbbb;
  --accent:#111111; --accent-fg:#ffffff;
}
*{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body{ height:100%; background:var(--bg2); }
body{ font-family:'DM Mono',monospace; }
.app{
  max-width:430px; margin:0 auto; height:100dvh;
  display:flex; flex-direction:column;
  background:var(--bg); position:relative; overflow:hidden;
}
/* 封面標題列 */
.topbar-fixed{
  flex-shrink:0;
  position:relative;
  z-index:10;
}
.cover-photo{
  width:100%; height:160px; overflow:hidden;
}
.cover-photo img{
  width:100%; height:100%; object-fit:cover; object-position:center top; display:block;
}
.topbar-overlay{
  position:absolute; bottom:0; left:0; right:0;
  background:linear-gradient(transparent, rgba(0,0,0,0.55));
  padding:32px 16px 12px;
}
.topbar-title{
  font-family:'Noto Serif TC',serif; font-size:18px;
  font-weight:600; color:#fff; letter-spacing:0.02em;
}
.topbar-sub{ font-size:11px; color:rgba(255,255,255,0.75); margin-top:3px; letter-spacing:0.05em; }
.body{ display:flex; flex:1; overflow:hidden; }
.leftnav{
  width:74px; min-width:74px; border-right:1px solid var(--border);
  overflow-y:auto; background:var(--bg2);
}
.leftnav::-webkit-scrollbar{ display:none; }
.nav-item{
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; padding:18px 6px; font-size:13px; color:var(--text3);
  border-left:3px solid transparent; cursor:pointer; text-align:center;
  line-height:1.4; min-height:64px; transition:all 0.15s; letter-spacing:0.02em;
}
.nav-item:hover{ color:var(--text2); background:var(--bg3); }
.nav-item.active{ color:var(--text); font-weight:500; border-left:3px solid var(--accent); background:var(--bg); }
.content{ flex:1; display:flex; flex-direction:column; overflow:hidden; }
.subtabs{
  display:flex; overflow-x:auto; padding:0 14px;
  border-bottom:1px solid var(--border); background:var(--bg); flex-shrink:0; gap:2px;
}
.subtabs::-webkit-scrollbar{ display:none; }
.subtab{
  padding:11px 12px; font-size:12px; color:var(--text3); cursor:pointer;
  border-bottom:2px solid transparent; white-space:nowrap; flex-shrink:0;
  transition:all 0.15s; font-family:'DM Mono',monospace; letter-spacing:0.03em;
}
.subtab:hover{ color:var(--text2); }
.subtab.active{ color:var(--text); font-weight:500; border-bottom:2px solid var(--accent); }
.item-list{ flex:1; overflow-y:auto; padding:0 16px 100px; }
.item-list::-webkit-scrollbar{ display:none; }
.item-card{
  display:flex; align-items:center; gap:14px;
  padding:14px 0; border-bottom:1px solid var(--border); cursor:pointer;
}
.item-img{
  width:62px; height:62px; border-radius:12px; background:var(--bg2);
  border:1px solid var(--border); display:flex; align-items:center;
  justify-content:center; font-size:26px; flex-shrink:0;
}
.item-info{ flex:1; min-width:0; }
.item-name{ font-size:14px; color:var(--text); line-height:1.3; }
.item-desc{ font-size:11px; color:var(--text3); margin-top:4px; line-height:1.4; }
.item-dots{ display:flex; gap:3px; margin-top:6px; }
.dot{ width:5px; height:5px; border-radius:50%; background:var(--border2); }
.dot.on{ background:var(--accent); }
.add-btn{
  width:30px; height:30px; border-radius:50%; border:1.5px solid var(--border2);
  background:var(--bg); color:var(--text); font-size:20px; line-height:1;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:all 0.15s;
}
.add-btn:hover,.add-btn.on{ background:var(--accent); color:var(--accent-fg); border-color:var(--accent); }
.cart-bar{
  position:absolute; bottom:0; left:0; right:0; padding:10px 14px 14px;
  border-top:1px solid var(--border); background:var(--bg);
  display:flex; align-items:center; gap:10px;
}
.cart-icon-wrap{
  position:relative; width:40px; height:40px; border:1px solid var(--border2);
  border-radius:12px; display:flex; align-items:center; justify-content:center;
  cursor:pointer; flex-shrink:0; font-size:20px;
}
.cart-badge{
  position:absolute; top:-6px; right:-6px; width:18px; height:18px;
  border-radius:50%; background:var(--accent); color:var(--accent-fg);
  font-size:10px; font-weight:500; display:none; align-items:center; justify-content:center;
}
.cart-badge.show{ display:flex; }
.cart-info{ flex:1; min-width:0; }
.cart-count{ font-size:12px; color:var(--text3); }
.cart-preview{ font-size:12px; color:var(--text2); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.view-btn{
  padding:11px 18px; border-radius:12px; background:var(--accent); color:var(--accent-fg);
  font-family:'DM Mono',monospace; font-size:12px; font-weight:500; border:none;
  cursor:pointer; white-space:nowrap; letter-spacing:0.05em; transition:opacity 0.15s;
}
.view-btn:hover{ opacity:0.8; }
.view-btn:disabled{ opacity:0.3; cursor:not-allowed; }
.overlay{
  position:absolute; inset:0; background:rgba(0,0,0,0.45);
  display:none; align-items:flex-end; z-index:30;
}
.overlay.open{ display:flex; }
.modal{
  width:100%; background:var(--bg); border-radius:20px 20px 0 0;
  padding:16px 16px 32px; max-height:85dvh; display:flex; flex-direction:column;
}
.modal-handle{ width:36px; height:4px; border-radius:2px; background:var(--border2); margin:0 auto 18px; }
.modal-title{ font-family:'Noto Serif TC',serif; font-size:17px; font-weight:600; color:var(--text); margin-bottom:14px; }
.modal-list{ flex:1; overflow-y:auto; margin-bottom:16px; }
.modal-list::-webkit-scrollbar{ display:none; }
.modal-item{
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 0; border-bottom:1px solid var(--border); font-size:13px; color:var(--text); gap:10px;
}
.modal-item-name{ flex:1; line-height:1.4; }
.modal-rm{ background:none; border:none; font-size:20px; color:var(--text3); cursor:pointer; padding:0; line-height:1; flex-shrink:0; }
.modal-rm:hover{ color:var(--text); }
.item-note-wrap{ padding:6px 0 12px; border-bottom:1px solid var(--border); }
.item-note-label{ font-size:10px; color:var(--text3); letter-spacing:0.06em; text-transform:uppercase; margin-bottom:5px; line-height:1.5; }
.item-note-input{
  width:100%; padding:8px 10px; font-family:'DM Mono',monospace; font-size:12px;
  border:1px solid var(--border); border-radius:8px; background:var(--bg2);
  color:var(--text); outline:none; resize:none;
}
.item-note-input:focus{ border-color:var(--border2); }
.item-note-input::placeholder{ color:var(--text3); }
.submit-btn{
  padding:11px 20px; border-radius:10px; background:var(--accent); color:var(--accent-fg);
  font-family:'DM Mono',monospace; font-size:13px; font-weight:500; border:none;
  cursor:pointer; white-space:nowrap; letter-spacing:0.04em; transition:opacity 0.15s;
}
.submit-btn:hover{ opacity:0.8; }
.submit-btn:disabled{ opacity:0.3; cursor:not-allowed; }
.toast{
  position:absolute; bottom:90px; left:50%;
  transform:translateX(-50%) translateY(12px);
  background:var(--accent); color:var(--accent-fg); font-size:12px;
  padding:10px 20px; border-radius:20px; opacity:0; transition:all 0.25s;
  pointer-events:none; white-space:nowrap; z-index:40; letter-spacing:0.03em;
}
.toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
.sending{
  position:absolute; inset:0; background:rgba(255,255,255,0.85);
  display:none; align-items:center; justify-content:center;
  z-index:50; flex-direction:column; gap:12px;
  font-size:13px; color:var(--text2); letter-spacing:0.05em;
}
.sending.show{ display:flex; }
.spinner{
  width:28px; height:28px; border:2px solid var(--border);
  border-top-color:var(--accent); border-radius:50%;
  animation:spin 0.7s linear infinite;
}
@keyframes spin{ to{ transform:rotate(360deg); } }
</style>
</head>

  var html = '';
  for (var i = 0; i < items.length; i++) {
    html += itemCard(items[i]);
  }
  return html;
}

function itemCard(item) {
  var on = cart.indexOf(item) !== -1;
  var esc = item.replace(/'/g, '\\x27');
  var dots = '';
  for (var i = 1; i <= 5; i++) {
    dots += '<div class="dot' + (i <= 3 ? ' on' : '') + '"></div>';
  }
  return '<div class="item-card" onclick="toggle(\'' + esc + '\')">' +
    '<div class="item-img">' + (EMOJI[item] || '🍽') + '</div>' +
    '<div class="item-info">' +
      '<div class="item-name">' + item + '</div>' +
      '<div class="item-desc">' + (DESC[item] || '') + '</div>' +
      '<div class="item-dots">' + dots + '</div>' +
    '</div>' +
    '<button class="add-btn' + (on ? ' on' : '') +
    '" onclick="toggle(\'' + esc + '\');event.stopPropagation()">' +
    (on ? '✓' : '+') + '</button>' +
  '</div>';
}

function renderCartBar() {
  var n = cart.length;
  var badge = document.getElementById('badge');
  badge.textContent = n;
  badge.className = 'cart-badge' + (n > 0 ? ' show' : '');
  document.getElementById('cartCount').textContent = n > 0 ? '已選 ' + n + ' 項' : '尚未選擇品項';
  document.getElementById('cartPreview').textContent = cart.join('、');
  document.getElementById('viewBtn').disabled = (n === 0);
}

function setCat(c) {
  selCat = c;
  if (c === '主食') selSub = '義大利麵';
  render();
}

function setSub(s) {
  selSub = s;
  renderContent();
}

function toggle(item) {
  var i = cart.indexOf(item);
  if (i === -1) cart.push(item);
  else cart.splice(i, 1);
  render();
}

function openModal() {
  if (cart.length === 0) return;
  var html = '';
  for (var i = 0; i < cart.length; i++) {
    var item = cart[i];
    var label = NOTE_LABEL[item] || '備註（要加什麼）';
    var ph = PLACEHOLDER[item] || '';
    html += '<div class="modal-item">' +
      '<span class="modal-item-name">' + item + '</span>' +
      '<button class="modal-rm" onclick="rmItem(' + i + ')">×</button>' +
    '</div>' +
    '<div class="item-note-wrap">' +
      '<div class="item-note-label">' + label + '</div>' +
      '<textarea class="item-note-input" data-item="' + i + '" rows="2" placeholder="' + ph + '"></textarea>' +
    '</div>';
  }
  document.getElementById('modalList').innerHTML = html;
  document.getElementById('overlay').classList.add('open');
  document.getElementById('submitBtn').disabled = false;
}

function outsideClose(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
}

function rmItem(i) {
  cart.splice(i, 1);
  render();
  if (cart.length === 0) closeModal();
  else openModal();
}

function submitOrder() {
  var now = new Date().toLocaleString('zh-TW', { timeZone: 'Asia/Taipei', hour12: false });
  var lines = ['🍽 *新訂單來了！*'];
  var noteInputs = document.querySelectorAll('.item-note-input');
  for (var i = 0; i < cart.length; i++) {
    var note = noteInputs[i] ? noteInputs[i].value.trim() : '';
    lines.push('📋 ' + cart[i] + (note ? '　→ ' + note : ''));
  }
  lines.push('🕐 時間：' + now);
  var msg = lines.join('\n');

  closeModal();
  document.getElementById('sending').classList.add('show');

  fetch('https://api.telegram.org/bot' + BOT_TOKEN + '/sendMessage', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ chat_id: CHAT_ID, text: msg, parse_mode: 'Markdown' })
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    document.getElementById('sending').classList.remove('show');
    if (data.ok) {
      showToast('訂單已送出 ✓');
      cart = [];
      render();
    } else {
      showToast('送出失敗，請再試一次');
    }
  })
  .catch(function() {
    document.getElementById('sending').classList.remove('show');
    showToast('網路錯誤，請再試一次');
  });
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3000);
}

render();
</script>
</body>
</html>
