<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>今日菜單</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#f3f0ff; --bg2:#e9e4f8; --bg3:#ddd6f3;
  --text:#1a0a2e; --text2:#4a2d7a; --text3:#9b7fd4;
  --border:#c4b5e8; --border2:#9b7fd4;
  --accent:#2d1b4e; --accent-fg:#ffffff;
}
*{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body{ height:100%; background:var(--bg2); }
body{ font-family:'DM Mono',monospace; }
.app{
  max-width:430px; margin:0 auto; height:100dvh;
  display:flex; flex-direction:column;
  background:var(--bg); position:relative; overflow:hidden;
}
/* 封面標題列 */
.topbar-fixed{
  flex-shrink:0;
  position:relative;
  z-index:10;
}
.cover-photo{
  width:100%; height:160px; overflow:hidden;
}
.cover-photo img{
  width:100%; height:100%; object-fit:contain; object-position:center center; display:block; background:#e8e0f0;
}
.topbar-overlay{
  position:absolute; bottom:0; left:0; right:0;
  background:linear-gradient(transparent, rgba(0,0,0,0.55));
  padding:32px 16px 12px;
}
.topbar-title{
  font-family:'Noto Serif TC',serif; font-size:18px;
  font-weight:600; color:#fff; letter-spacing:0.02em;
}
.topbar-sub{ font-size:11px; color:rgba(255,255,255,0.75); margin-top:3px; letter-spacing:0.05em; }
.body{ display:flex; flex:1; overflow:hidden; }
.leftnav{
  width:74px; min-width:74px; border-right:1px solid var(--border);
  overflow-y:auto; background:var(--bg2);
}
.leftnav::-webkit-scrollbar{ display:none; }
.nav-item{
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; padding:18px 6px; font-size:13px; color:var(--text3);
  border-left:3px solid transparent; cursor:pointer; text-align:center;
  line-height:1.4; min-height:64px; transition:all 0.15s; letter-spacing:0.02em;
}
.nav-item:hover{ color:var(--text2); background:var(--bg3); }
.nav-item.active{ color:var(--text); font-weight:500; border-left:3px solid var(--accent); background:var(--bg); }
.content{ flex:1; display:flex; flex-direction:column; overflow:hidden; }
.subtabs{
  display:flex; overflow-x:auto; padding:0 14px;
  border-bottom:1px solid var(--border); background:var(--bg); flex-shrink:0; gap:2px;
}
.subtabs::-webkit-scrollbar{ display:none; }
.subtab{
  padding:11px 12px; font-size:12px; color:var(--text3); cursor:pointer;
  border-bottom:2px solid transparent; white-space:nowrap; flex-shrink:0;
  transition:all 0.15s; font-family:'DM Mono',monospace; letter-spacing:0.03em;
}
.subtab:hover{ color:var(--text2); }
.subtab.active{ color:var(--text); font-weight:500; border-bottom:2px solid var(--accent); }
.item-list{ flex:1; overflow-y:auto; padding:0 16px 100px; }
.item-list::-webkit-scrollbar{ display:none; }
.item-card{
  display:flex; align-items:center; gap:14px;
  padding:14px 0; border-bottom:1px solid var(--border); cursor:pointer;
}
.item-img{
  width:62px; height:62px; border-radius:12px; background:var(--bg2);
  border:1px solid var(--border); display:flex; align-items:center;
  justify-content:center; font-size:26px; flex-shrink:0;
}
.item-info{ flex:1; min-width:0; }
.item-name{ font-size:14px; color:var(--text); line-height:1.3; }
.item-desc{ font-size:11px; color:var(--text3); margin-top:4px; line-height:1.4; }
.item-dots{ display:flex; gap:3px; margin-top:6px; }
.dot{ width:5px; height:5px; border-radius:50%; background:var(--border2); }
.dot.on{ background:var(--accent); }
.add-btn{
  width:30px; height:30px; border-radius:50%; border:1.5px solid var(--border2);
  background:var(--bg); color:var(--text); font-size:20px; line-height:1;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:all 0.15s;
}
.add-btn:hover,.add-btn.on{ background:var(--accent); color:var(--accent-fg); border-color:var(--accent); }
.cart-bar{
  position:absolute; bottom:0; left:0; right:0; padding:10px 14px 14px;
  border-top:1px solid var(--border); background:var(--bg);
  display:flex; align-items:center; gap:10px;
}
.cart-icon-wrap{
  position:relative; width:40px; height:40px; border:1px solid var(--border2);
  border-radius:12px; display:flex; align-items:center; justify-content:center;
  cursor:pointer; flex-shrink:0; font-size:20px;
}
.cart-badge{
  position:absolute; top:-6px; right:-6px; width:18px; height:18px;
  border-radius:50%; background:var(--accent); color:var(--accent-fg);
  font-size:10px; font-weight:500; display:none; align-items:center; justify-content:center;
}
.cart-badge.show{ display:flex; }
.cart-info{ flex:1; min-width:0; }
.cart-count{ font-size:12px; color:var(--text3); }
.cart-preview{ font-size:12px; color:var(--text2); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.view-btn{
  padding:11px 18px; border-radius:12px; background:var(--accent); color:var(--accent-fg);
  font-family:'DM Mono',monospace; font-size:12px; font-weight:500; border:none;
  cursor:pointer; white-space:nowrap; letter-spacing:0.05em; transition:opacity 0.15s;
}
.view-btn:hover{ opacity:0.8; }
.view-btn:disabled{ opacity:0.3; cursor:not-allowed; }
.overlay{
  position:absolute; inset:0; background:rgba(0,0,0,0.45);
  display:none; align-items:flex-end; z-index:30;
}
.overlay.open{ display:flex; }
.modal{
  width:100%; background:var(--bg); border-radius:20px 20px 0 0;
  padding:16px 16px 32px; max-height:85dvh; display:flex; flex-direction:column;
}
.modal-handle{ width:36px; height:4px; border-radius:2px; background:var(--border2); margin:0 auto 18px; }
.modal-title{ font-family:'Noto Serif TC',serif; font-size:17px; font-weight:600; color:var(--text); margin-bottom:14px; }
.modal-list{ flex:1; overflow-y:auto; margin-bottom:16px; }
.modal-list::-webkit-scrollbar{ display:none; }
.modal-item{
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 0; border-bottom:1px solid var(--border); font-size:13px; color:var(--text); gap:10px;
}
.modal-item-name{ flex:1; line-height:1.4; }
.modal-rm{ background:none; border:none; font-size:20px; color:var(--text3); cursor:pointer; padding:0; line-height:1; flex-shrink:0; }
.modal-rm:hover{ color:var(--text); }
.item-note-wrap{ padding:6px 0 12px; border-bottom:1px solid var(--border); }
.item-note-label{ font-size:10px; color:var(--text3); letter-spacing:0.06em; text-transform:uppercase; margin-bottom:5px; line-height:1.5; }
.item-note-input{
  width:100%; padding:8px 10px; font-family:'DM Mono',monospace; font-size:12px;
  border:1px solid var(--border); border-radius:8px; background:var(--bg2);
  color:var(--text); outline:none; resize:none;
}
.item-note-input:focus{ border-color:var(--border2); }
.item-note-input::placeholder{ color:var(--text3); }
.submit-btn{
  padding:11px 20px; border-radius:10px; background:var(--accent); color:var(--accent-fg);
  font-family:'DM Mono',monospace; font-size:13px; font-weight:500; border:none;
  cursor:pointer; white-space:nowrap; letter-spacing:0.04em; transition:opacity 0.15s;
}
.submit-btn:hover{ opacity:0.8; }
.submit-btn:disabled{ opacity:0.3; cursor:not-allowed; }
.toast{
  position:absolute; bottom:90px; left:50%;
  transform:translateX(-50%) translateY(12px);
  background:var(--accent); color:var(--accent-fg); font-size:12px;
  padding:10px 20px; border-radius:20px; opacity:0; transition:all 0.25s;
  pointer-events:none; white-space:nowrap; z-index:40; letter-spacing:0.03em;
}
.toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
.sending{
  position:absolute; inset:0; background:rgba(255,255,255,0.85);
  display:none; align-items:center; justify-content:center;
  z-index:50; flex-direction:column; gap:12px;
  font-size:13px; color:var(--text2); letter-spacing:0.05em;
}
.sending.show{ display:flex; }
.spinner{
  width:28px; height:28px; border:2px solid var(--border);
  border-top-color:var(--accent); border-radius:50%;
  animation:spin 0.7s linear infinite;
}
@keyframes spin{ to{ transform:rotate(360deg); } }

/* === 啟動動畫 === */
.splash{
  position:fixed; inset:0; background:var(--accent); z-index:200;
  display:flex; align-items:center; justify-content:center; flex-direction:column;
  gap:14px; transition:opacity 0.5s ease, visibility 0.5s ease;
}
.splash.hide{ opacity:0; visibility:hidden; pointer-events:none; }
.splash-logo{
  font-family:'Noto Serif TC',serif; font-size:32px; color:#fff;
  letter-spacing:0.1em;
  animation: splashIn 0.9s cubic-bezier(0.34,1.56,0.64,1) both;
}
.splash-sub{
  font-size:11px; color:rgba(255,255,255,0.6); letter-spacing:0.3em;
  animation: splashIn 0.9s 0.2s cubic-bezier(0.34,1.56,0.64,1) both;
}
.splash-dots{
  display:flex; gap:6px; margin-top:8px;
  animation: splashIn 0.9s 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
}
.splash-dots span{
  width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.5);
  animation: dotPulse 1.2s infinite;
}
.splash-dots span:nth-child(2){ animation-delay:0.2s; }
.splash-dots span:nth-child(3){ animation-delay:0.4s; }
@keyframes splashIn{
  from{ transform:scale(0.7) translateY(20px); opacity:0; }
  to  { transform:scale(1) translateY(0); opacity:1; }
}
@keyframes dotPulse{
  0%,100%{ opacity:0.3; transform:scale(0.8); }
  50%   { opacity:1;   transform:scale(1.2); }
}
/* === 內容入場 === */
.app{ animation: appFadeIn 0.6s 0.5s ease both; }
@keyframes appFadeIn{
  from{ opacity:0; transform:scale(0.98); }
  to  { opacity:1; transform:scale(1); }
}
/* === 卡片漸入 === */
.item-card{
  animation: cardSlide 0.4s ease both;
}
.item-card:nth-child(1){ animation-delay:0.05s; }
.item-card:nth-child(2){ animation-delay:0.1s; }
.item-card:nth-child(3){ animation-delay:0.15s; }
.item-card:nth-child(4){ animation-delay:0.2s; }
.item-card:nth-child(5){ animation-delay:0.25s; }
.item-card:nth-child(n+6){ animation-delay:0.3s; }
@keyframes cardSlide{
  from{ opacity:0; transform:translateY(12px); }
  to  { opacity:1; transform:translateY(0); }
}
/* === 加號按鈕脈衝 === */
.add-btn{ transition:all 0.2s cubic-bezier(0.34,1.56,0.64,1); }
.add-btn:active{ transform:scale(0.85); }
.add-btn.on{ animation: addPop 0.3s ease; }
@keyframes addPop{
  0%  { transform:scale(1); }
  50% { transform:scale(1.25); }
  100%{ transform:scale(1); }
}
/* === 徽章跳動 === */
.cart-badge.show{ animation: badgePop 0.3s ease; }
@keyframes badgePop{
  0%  { transform:scale(0); }
  60% { transform:scale(1.3); }
  100%{ transform:scale(1); }
}
/* === Header 標題優雅進場 === */
.topbar-title{
  animation: titleSlide 0.7s 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
}
.topbar-sub{
  animation: titleSlide 0.7s 0.85s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes titleSlide{
  from{ opacity:0; transform:translateY(8px); }
  to  { opacity:1; transform:translateY(0); }
}
/* === 角落裝飾 === */
.corner-deco{
  position:fixed; pointer-events:none; opacity:0.15; font-size:14px;
  animation: floatDeco 6s ease-in-out infinite;
}
.corner-deco.tl{ top:8px; left:8px; }
.corner-deco.tr{ top:8px; right:8px; animation-delay:1s; }
.corner-deco.bl{ bottom:8px; left:8px; animation-delay:2s; }
.corner-deco.br{ bottom:8px; right:8px; animation-delay:3s; }
@keyframes floatDeco{
  0%,100%{ transform:translateY(0) rotate(0deg); }
  50%   { transform:translateY(-6px) rotate(5deg); }
}
/* === 購物車按鈕呼吸 === */
.view-btn:not(:disabled){
  animation: btnGlow 2s ease-in-out infinite;
}
@keyframes btnGlow{
  0%,100%{ box-shadow:0 0 0 0 rgba(45,27,78,0.4); }
  50%   { box-shadow:0 0 0 8px rgba(45,27,78,0); }
}
/* === modal 進場 === */
.overlay.open .modal{
  animation: modalUp 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes modalUp{
  from{ transform:translateY(100%); }
  to  { transform:translateY(0); }
}


/* === 浮誇升級 === */
body{
  background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 25%, #4a2d7a 50%, #2d1b4e 75%, #1a0a2e 100%);
  background-size: 400% 400%;
  animation: bgShift 20s ease infinite;
  min-height:100vh;
}
@keyframes bgShift{
  0%,100%{ background-position:0% 50%; }
  50%   { background-position:100% 50%; }
}

/* App 容器加金邊光暈 */
.app{
  border-radius:24px;
  box-shadow: 
    0 0 0 1px rgba(196,181,232,0.3),
    0 0 40px rgba(124,58,237,0.4),
    0 0 80px rgba(124,58,237,0.2),
    0 20px 60px rgba(0,0,0,0.5);
  overflow:hidden;
  position:relative;
}
.app::before{
  content:'';
  position:absolute; inset:-2px;
  background: linear-gradient(45deg, #c4b5e8, #7c3aed, #c4b5e8, #ffd700, #c4b5e8);
  background-size: 400% 400%;
  border-radius:26px;
  z-index:-1;
  animation: borderFlow 4s linear infinite;
  opacity:0.6;
}
@keyframes borderFlow{
  0%,100%{ background-position:0% 50%; }
  50%   { background-position:100% 50%; }
}

/* Splash 升級 */
.splash{
  background: radial-gradient(circle at 50% 50%, #4a2d7a 0%, #2d1b4e 50%, #0a0218 100%);
}
.splash::before{
  content:'';
  position:absolute; inset:0;
  background-image:
    radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,0.8), transparent),
    radial-gradient(1px 1px at 60% 70%, rgba(255,255,255,0.6), transparent),
    radial-gradient(2px 2px at 80% 20%, rgba(255,215,0,0.7), transparent),
    radial-gradient(1px 1px at 30% 80%, rgba(255,255,255,0.5), transparent),
    radial-gradient(2px 2px at 90% 60%, rgba(196,181,232,0.8), transparent),
    radial-gradient(1px 1px at 10% 50%, rgba(255,255,255,0.6), transparent),
    radial-gradient(2px 2px at 70% 90%, rgba(255,215,0,0.5), transparent);
  background-size: 100% 100%;
  animation: starTwinkle 4s ease-in-out infinite;
}
@keyframes starTwinkle{
  0%,100%{ opacity:0.4; }
  50%   { opacity:1; }
}
.splash-logo{
  font-size:44px;
  background: linear-gradient(135deg, #fff 0%, #c4b5e8 50%, #ffd700 100%);
  -webkit-background-clip:text; background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow: 0 0 30px rgba(196,181,232,0.6);
  filter: drop-shadow(0 0 20px rgba(255,215,0,0.4));
  position:relative; z-index:1;
}
.splash-sub{
  color:rgba(255,215,0,0.8) !important;
  letter-spacing:0.5em !important;
  font-weight:500;
  position:relative; z-index:1;
}
.splash-dots span{
  background: linear-gradient(135deg, #ffd700, #c4b5e8) !important;
  box-shadow: 0 0 10px rgba(255,215,0,0.8);
}

/* 標題列加金光 */
.topbar-title{
  background: linear-gradient(135deg, #fff 0%, #ffd700 50%, #fff 100%);
  background-size: 200% 200%;
  -webkit-background-clip:text; background-clip:text;
  -webkit-text-fill-color:transparent;
  font-size:20px !important;
  text-shadow: 0 2px 8px rgba(0,0,0,0.5);
  filter: drop-shadow(0 0 8px rgba(255,215,0,0.5));
  animation: shimmer 3s linear infinite;
}
@keyframes shimmer{
  0%,100%{ background-position:0% 50%; }
  50%   { background-position:100% 50%; }
}
.topbar-sub{
  color:rgba(255,215,0,0.85) !important;
  text-shadow: 0 1px 4px rgba(0,0,0,0.6);
}

/* 左側導航發光 */
.nav-item.active{
  background: linear-gradient(90deg, rgba(124,58,237,0.15) 0%, rgba(255,215,0,0.05) 100%) !important;
  border-left: 3px solid transparent !important;
  border-image: linear-gradient(180deg, #ffd700, #7c3aed, #ffd700) 1;
  position:relative;
}
.nav-item.active::after{
  content:'';
  position:absolute; left:0; top:0; bottom:0; width:3px;
  background: linear-gradient(180deg, #ffd700, #7c3aed, #ffd700);
  background-size:100% 200%;
  animation: navGlow 2s ease infinite;
  box-shadow: 0 0 8px rgba(255,215,0,0.6);
}
@keyframes navGlow{
  0%,100%{ background-position:0% 0%; }
  50%   { background-position:0% 100%; }
}

/* 子分類 tabs 升級 */
.subtab.active{
  color: var(--accent) !important;
  font-weight:600 !important;
  border-bottom: 2px solid transparent !important;
  position:relative;
}
.subtab.active::after{
  content:'';
  position:absolute; left:0; right:0; bottom:-1px; height:2px;
  background: linear-gradient(90deg, #ffd700, #7c3aed, #ffd700);
  background-size:200% 100%;
  animation: tabSlide 2s linear infinite;
  box-shadow: 0 0 6px rgba(255,215,0,0.7);
}
@keyframes tabSlide{
  0%  { background-position:0% 0%; }
  100%{ background-position:200% 0%; }
}

/* 品項卡片豪華邊框 */
.item-card{
  position:relative;
  padding:14px 12px !important;
  border-bottom:none !important;
  border-radius:14px;
  margin:8px 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.6) 0%, rgba(196,181,232,0.1) 100%);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(196,181,232,0.3);
  transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.item-card:hover{
  transform: translateY(-2px) scale(1.01);
  box-shadow: 
    0 8px 24px rgba(124,58,237,0.25),
    0 0 0 1px rgba(255,215,0,0.4);
  background: linear-gradient(135deg, rgba(255,255,255,0.9) 0%, rgba(196,181,232,0.2) 100%);
}
.item-card::before{
  content:'';
  position:absolute; inset:0;
  border-radius:14px;
  padding:1px;
  background: linear-gradient(135deg, transparent, rgba(255,215,0,0.5), transparent);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude;
  opacity:0; transition: opacity 0.3s;
  pointer-events:none;
}
.item-card:hover::before{ opacity:1; }

/* 品項圖片發光 */
.item-img{
  border-radius:14px !important;
  box-shadow: 
    0 4px 12px rgba(124,58,237,0.3),
    0 0 0 2px rgba(255,255,255,0.8),
    0 0 0 3px rgba(196,181,232,0.4);
  transition: all 0.3s;
}
.item-card:hover .item-img{
  transform: rotate(-3deg) scale(1.08);
  box-shadow: 
    0 8px 20px rgba(124,58,237,0.5),
    0 0 0 2px #fff,
    0 0 0 4px rgba(255,215,0,0.6);
}

/* 加號按鈕浮誇升級 */
.add-btn{
  background: linear-gradient(135deg, #fff 0%, #f3f0ff 100%) !important;
  border: 1.5px solid rgba(124,58,237,0.4) !important;
  box-shadow: 
    0 2px 6px rgba(124,58,237,0.2),
    inset 0 1px 0 rgba(255,255,255,0.8);
  font-weight:600 !important;
}
.add-btn.on{
  background: linear-gradient(135deg, #7c3aed 0%, #2d1b4e 50%, #ffd700 200%) !important;
  border-color: #ffd700 !important;
  box-shadow: 
    0 0 0 2px rgba(255,215,0,0.4),
    0 4px 12px rgba(124,58,237,0.6),
    inset 0 1px 0 rgba(255,255,255,0.3) !important;
  color:#fff !important;
}

/* 圓點豪華 */
.dot.on{
  background: linear-gradient(135deg, #ffd700, #7c3aed) !important;
  box-shadow: 0 0 4px rgba(255,215,0,0.8);
}

/* 購物車列升級 */
.cart-bar{
  background: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(243,240,255,0.95) 100%) !important;
  backdrop-filter: blur(10px);
  border-top: 1px solid rgba(255,215,0,0.4) !important;
  box-shadow: 0 -4px 20px rgba(124,58,237,0.15);
}
.cart-icon-wrap{
  background: linear-gradient(135deg, #fff 0%, #f3f0ff 100%) !important;
  border: 1.5px solid rgba(124,58,237,0.3) !important;
  box-shadow: 0 2px 8px rgba(124,58,237,0.15);
  transition: all 0.3s;
}
.cart-icon-wrap:hover{
  transform: scale(1.08) rotate(-5deg);
  box-shadow: 0 4px 16px rgba(124,58,237,0.4);
  border-color: #ffd700 !important;
}
.cart-badge{
  background: linear-gradient(135deg, #ff4081 0%, #ffd700 100%) !important;
  box-shadow: 0 0 0 2px #fff, 0 0 12px rgba(255,64,129,0.6);
  font-weight:700 !important;
}

/* 查看訂單按鈕 */
.view-btn{
  background: linear-gradient(135deg, #2d1b4e 0%, #7c3aed 50%, #2d1b4e 100%) !important;
  background-size: 200% 200% !important;
  border: 1px solid rgba(255,215,0,0.5) !important;
  font-weight:600 !important;
  letter-spacing:0.1em !important;
  position:relative;
  overflow:hidden;
}
.view-btn:not(:disabled){
  animation: btnGlow 2s ease-in-out infinite, btnShine 4s linear infinite;
  box-shadow: 
    0 4px 16px rgba(124,58,237,0.5),
    0 0 0 1px rgba(255,215,0,0.3),
    inset 0 1px 0 rgba(255,255,255,0.2);
}
@keyframes btnShine{
  0%,100%{ background-position:0% 50%; }
  50%   { background-position:100% 50%; }
}
.view-btn:not(:disabled)::after{
  content:'';
  position:absolute; top:0; left:-100%;
  width:50%; height:100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
  animation: btnSweep 3s ease-in-out infinite;
}
@keyframes btnSweep{
  0%  { left:-100%; }
  100%{ left:200%; }
}

/* 角落裝飾大升級 */
.corner-deco{
  font-size:20px !important;
  opacity:0.4 !important;
  filter: drop-shadow(0 0 6px rgba(255,215,0,0.6));
  z-index:100;
}

/* Modal 升級 */
.modal{
  background: linear-gradient(135deg, #fff 0%, #f3f0ff 100%) !important;
  border-top: 2px solid transparent;
  border-image: linear-gradient(90deg, #ffd700, #7c3aed, #ffd700) 1;
  box-shadow: 0 -10px 40px rgba(124,58,237,0.4);
}
.modal-title{
  background: linear-gradient(135deg, #2d1b4e 0%, #7c3aed 100%);
  -webkit-background-clip:text; background-clip:text;
  -webkit-text-fill-color:transparent;
  font-size:19px !important;
}
.modal-handle{
  background: linear-gradient(90deg, #ffd700, #7c3aed) !important;
  width:48px !important;
  box-shadow: 0 0 8px rgba(255,215,0,0.5);
}

/* 送出按鈕 */
.submit-btn{
  background: linear-gradient(135deg, #2d1b4e 0%, #7c3aed 50%, #ffd700 200%) !important;
  background-size: 200% 200% !important;
  font-weight:700 !important;
  letter-spacing:0.1em !important;
  border: 1px solid rgba(255,215,0,0.5) !important;
  box-shadow: 
    0 4px 16px rgba(124,58,237,0.4),
    inset 0 1px 0 rgba(255,255,255,0.2);
  animation: btnShine 3s linear infinite;
}

/* Toast 升級 */
.toast{
  background: linear-gradient(135deg, #2d1b4e 0%, #7c3aed 100%) !important;
  border: 1px solid rgba(255,215,0,0.5);
  box-shadow: 0 8px 24px rgba(124,58,237,0.5);
  font-weight:500 !important;
}

/* Spinner 升級 */
.spinner{
  border-top-color: #ffd700 !important;
  border-right-color: #7c3aed !important;
  box-shadow: 0 0 16px rgba(255,215,0,0.5);
}

/* 漂浮粒子 */
.floating-particles{
  position:fixed; inset:0; pointer-events:none; z-index:1;
  overflow:hidden;
}
.particle{
  position:absolute;
  font-size:14px;
  opacity:0;
  animation: floatUp linear infinite;
}
@keyframes floatUp{
  0%   { transform:translateY(110vh) rotate(0deg); opacity:0; }
  10%  { opacity:0.5; }
  90%  { opacity:0.5; }
  100% { transform:translateY(-10vh) rotate(360deg); opacity:0; }
}

</style>

function renderNav() {

  var cats = ['主食','甜點','去外面吃','特殊服務','說明'];
  for (var i = 0; i < cats.length; i++) {
    var c = cats[i];
    html += '<div class="nav-item' + (c === selCat ? ' active' : '') +
            '" onclick="setCat(\'' + c + '\')">' + c + '</div>';
  }
  document.getElementById('leftnav').innerHTML = html;
}

      '<p style="margin-bottom:12px;"><b>特殊服務不要亂用</b>，有需要的話可以單獨送出那個，或者是跟餐點一起送出訂單。</p>' +
      '<p style="margin-bottom:4px;color:var(--text3);font-size:12px;">例如：</p>' +
      '<p style="background:var(--bg2);border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:12px;color:var(--text2);">點中原夜市 ＋ 特殊服務其中一個，然後一起送出。</p>' +
      '<p style="color:var(--text3);font-size:12px;">不懂的再問周柏呈 👍</p>' +
    '</div>';
  }
}

function buildCards(items) {
  var html = '';
  for (var i = 0; i < items.length; i++) {
    html += itemCard(items[i]);
  }
  return html;
}

function itemCard(item) {
  var on = cart.indexOf(item) !== -1;
  var esc = item.replace(/'/g, '\\x27');
  var dots = '';
  for (var i = 1; i <= 5; i++) {
    dots += '<div class="dot' + (i <= 3 ? ' on' : '') + '"></div>';
  }
  return '<div class="item-card" onclick="toggle(\'' + esc + '\')">' +
    '<div class="item-img">' + (ITEM_PHOTOS[item] ? '<img src="' + ITEM_PHOTOS[item] + '" style="width:100%;height:100%;object-fit:cover;border-radius:11px;"/>' : (EMOJI[item] || '🍽')) + '</div>' +
    '<div class="item-info">' +
      '<div class="item-name">' + item + '</div>' +
      '<div class="item-desc">' + (DESC[item] || '') + '</div>' +
      '<div class="item-dots">' + dots + '</div>' +
    '</div>' +
    '<button class="add-btn' + (on ? ' on' : '') +
    '" onclick="toggle(\'' + esc + '\');event.stopPropagation()">' +
    (on ? '✓' : '+') + '</button>' +
  '</div>';
}

function renderCartBar() {
  var n = cart.length;
  var badge = document.getElementById('badge');
  badge.textContent = n;
  badge.className = 'cart-badge' + (n > 0 ? ' show' : '');
  document.getElementById('cartCount').textContent = n > 0 ? '已選 ' + n + ' 項' : '尚未選擇品項';
  document.getElementById('cartPreview').textContent = cart.join('、');
  document.getElementById('viewBtn').disabled = (n === 0);
}

function setCat(c) {
  selCat = c;
  if (c === '主食') selSub = '義大利麵';
  render();
}

function setSub(s) {
  selSub = s;
  renderContent();
}

function toggle(item) {
  var i = cart.indexOf(item);
  if (i === -1) cart.push(item);
  else cart.splice(i, 1);
  render();
}

function openModal() {
  if (cart.length === 0) return;
  var html = '';
  for (var i = 0; i < cart.length; i++) {
    var item = cart[i];
    var label = NOTE_LABEL[item] || '備註（要加什麼）';
    var ph = PLACEHOLDER[item] || '';
    html += '<div class="modal-item">' +
      '<span class="modal-item-name">' + item + '</span>' +
      '<button class="modal-rm" onclick="rmItem(' + i + ')">×</button>' +
    '</div>' +
    '<div class="item-note-wrap">' +
      (item === '💰 急需用錢' ? '<p style="font-size:12px;color:var(--text2);line-height:1.7;margin-bottom:8px;">簡單來說就是借錢或報銷的服務。<br/>例如跟朋友出去沒帶錢，可以跟我要 LINE Pay 條碼，或提前用轉帳。<br/>報銷是買化妝品、衣服不夠錢的時候可以來找我報銷。<br/>具體要多少跟支付方式打在下面。</p>' : '') +
      '<textarea class="item-note-input" data-item="' + i + '" rows="2" placeholder="' + ph + '"></textarea>' +
    '</div>';
  }
  document.getElementById('modalList').innerHTML = html;
  document.getElementById('overlay').classList.add('open');
  document.getElementById('submitBtn').disabled = false;
}

function outsideClose(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
}

function rmItem(i) {
  cart.splice(i, 1);
  render();
  if (cart.length === 0) closeModal();
  else openModal();
}

function submitOrder() {
  var now = new Date().toLocaleString('zh-TW', { timeZone: 'Asia/Taipei', hour12: false });
  var lines = ['🍽 *新訂單來了！*'];
  var noteInputs = document.querySelectorAll('.item-note-input');
  for (var i = 0; i < cart.length; i++) {
    var note = noteInputs[i] ? noteInputs[i].value.trim() : '';
    lines.push('📋 ' + cart[i] + (note ? '　→ ' + note : ''));
  }
  lines.push('🕐 時間：' + now);
  var msg = lines.join('\n');

  closeModal();
  document.getElementById('sending').classList.add('show');

  fetch('https://api.telegram.org/bot' + BOT_TOKEN + '/sendMessage', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ chat_id: CHAT_ID, text: msg, parse_mode: 'Markdown' })
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    document.getElementById('sending').classList.remove('show');
    if (data.ok) {
      showToast('訂單已送出 ✓');
      cart = [];
      render();
    } else {
      showToast('送出失敗，請再試一次');
    }
  })
  .catch(function() {
    document.getElementById('sending').classList.remove('show');
    showToast('網路錯誤，請再試一次');
  });
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3000);
}

render();

// 啟動動畫
setTimeout(function(){
  document.getElementById('splash').classList.add('hide');
}, 1400);
</script>
</body>
</html>
